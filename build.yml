name: Build ShutdownTimer.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller pillow

      - name: Extract icon from source
        run: |
          python - << 'PYEOF'
          import base64, re

          src = open("shutdown_timer.py", encoding="utf-8").read()
          match = re.search(r'ICON_B64 = """(.+?)"""', src, re.DOTALL)
          data = base64.b64decode(match.group(1).strip())
          open("icon.ico", "wb").write(data)
          print(f"icon.ico extracted: {len(data)} bytes")
          PYEOF

      - name: Build .exe
        run: |
          pyinstaller --onefile --windowed `
            --name "ShutdownTimer" `
            --icon "icon.ico" `
            shutdown_timer.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShutdownTimer-Windows
          path: dist/ShutdownTimer.exe
          retention-days: 30
